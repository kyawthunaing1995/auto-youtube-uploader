name: Daily YouTube Upload

on:
  schedule:
    # နေ့တိုင်း မြန်မာစံတော်ချိန် မနက် ၂:၂၁ မှာ Run မည် (UTC 19:51)
    - cron: '51 19 * * *' 
  workflow_dispatch: # မိမိကိုယ်တိုင် စမ်းသပ်နှိပ်ပြီး Run ချင်ရင်လည်း ရအောင် ဖွင့်ထားခြင်း

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write # နေ့တိုင်း ဗီဒီယိုတင်ပြီးရင် uploaded.txt ကို GitHub ပေါ် ပြန်သိမ်းခွင့် ပေးခြင်း
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

    - name: Run Upload Script
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      run: python upload_bot.py

    - name: Commit and Push uploaded.txt Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add uploaded.txt
        git commit -m "Update uploaded videos log [skip ci]" || exit 0
        git push
